<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frontend Mentor - Results Summary Component</title>
  <link rel="stylesheet" href="estilo/style2.css">
</head>
<body>

  <main class="card-container">
    
    <!-- Seção do Resultado Geral (Painel Roxo) -->
    <section class="result-panel">
      <h1 class="panel-title">Your Result</h1>
      
      <div class="score-circle">
        <span class="score-big">76</span>
        <span class="score-total">of 100</span>
      </div>
      
      <p class="feedback-status">Great</p>
      <p class="feedback-text">
        You scored higher than 65% of the people who have taken these tests.
      </p>
    </section>

    <!-- Seção do Resumo (Painel Branco) -->
    <section class="summary-panel">
      <h2 class="summary-title">Summary</h2>
      
      <div class="summary-list">
        
        <!-- Item: Reaction -->
        <div class="summary-item reaction">
          <div class="item-label">
            <img src="" alt="" aria-hidden="true"> <!-- Insira o ícone aqui -->
            <span>Reaction</span>
          </div>
          <p class="item-score"><strong>80</strong> / 100</p>
        </div>

        <!-- Item: Memory -->
        <div class="summary-item memory">
          <div class="item-label">
            <img src="" alt="" aria-hidden="true">
            <span>Memory</span>
          </div>
          <p class="item-score"><strong>92</strong> / 100</p>
        </div>

        <!-- Item: Verbal -->
        <div class="summary-item verbal">
          <div class="item-label">
            <img src="" alt="" aria-hidden="true">
            <span>Verbal</span>
          </div>
          <p class="item-score"><strong>61</strong> / 100</p>
        </div>

        <!-- Item: Visual -->
        <div class="summary-item visual">
          <div class="item-label">
            <img src="" alt="" aria-hidden="true">
            <span>Visual</span>
          </div>
          <p class="item-score"><strong>73</strong> / 100</p>
        </div>

      </div>

      <button class="btn-continue">Continue</button>
    </section>

  </main>

</body>
</html>
